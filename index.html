<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sowvik Misra - AI, Automation & Art</title>
<meta name="description" content="Portfolio of Sowvik Misra - AI & Automation Consultant and Creative Artist. Agentic AI, Copilot Studio, poetry, percussion.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Instrument+Serif&display=swap" rel="stylesheet">

<style>
/* ========== 01-base.css ========== */
:root{
  --bg:#f4f1ec;--bg-2:#ebe7df;--fg:#161514;--fg-2:#4a4744;--fg-3:#8a857e;
  --rule:#d8d3ca;--rule-2:#c6c0b5;--accent:oklch(0.58 0.14 35);--accent-ink:#fff;
  --f-sans:"Inter Tight","Helvetica Neue",Helvetica,Arial,sans-serif;
  --f-mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  --max:1440px;--gutter:clamp(20px,3.2vw,48px);--rule-w:1px;
}
:root[data-theme="dark"]{
  --bg:#14130f;--bg-2:#1c1b17;--fg:#f1ede5;--fg-2:#b7b2a8;--fg-3:#6d6860;
  --rule:#2a2823;--rule-2:#3a372f;--accent:oklch(0.74 0.13 35);--accent-ink:#14130f;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
html{background:var(--bg)}
body{font-family:var(--f-sans);background:var(--bg);color:var(--fg);font-size:16px;line-height:1.45;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;transition:background 280ms ease,color 280ms ease}
a{color:inherit;text-decoration:none}
::selection{background:var(--accent);color:var(--accent-ink)}
img,svg{display:block;max-width:100%}
.shell{max-width:var(--max);margin:0 auto;padding:0 var(--gutter)}
.grid-12{display:grid;grid-template-columns:repeat(12,1fr);gap:var(--gutter)}

/* ========== 02-chrome.css ========== */
.marquee{border-bottom:var(--rule-w) solid var(--rule);font-family:var(--f-mono);font-size:11px;color:var(--fg-2);height:32px;display:flex;align-items:center;overflow:hidden;white-space:nowrap;position:relative}
.marquee .track{display:inline-flex;gap:48px;padding-left:100%;animation:mq 140s linear infinite;will-change:transform}
.marquee .k{color:var(--fg-3)}
.marquee .v{color:var(--fg)}
.marquee .dot{color:var(--fg-3)}
@keyframes mq{from{transform:translateX(0)}to{transform:translateX(-100%)}}
.nav{display:grid;grid-template-columns:1fr auto;align-items:center;padding:22px 0;border-bottom:var(--rule-w) solid var(--rule)}
.wordmark{font-family:var(--f-sans);font-weight:500;font-size:15px;letter-spacing:-.01em;display:inline-flex;gap:10px;align-items:center}
.wordmark .mark{display:inline-block;width:10px;height:10px;background:var(--accent);border-radius:1px}
.wordmark .sub{font-family:var(--f-mono);font-size:11px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.08em;margin-left:8px}
.nav ul{list-style:none;margin:0;padding:0;display:flex;gap:28px;align-items:center}
.nav a.navlink{font-family:var(--f-mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--fg-2);position:relative;padding:4px 0}
.nav a.navlink:hover,.nav a.navlink[aria-current="page"]{color:var(--fg)}
.nav a.navlink[aria-current="page"]::before{content:"";position:absolute;left:-10px;top:50%;width:4px;height:4px;background:var(--accent);transform:translateY(-50%);border-radius:1px}
.theme-toggle{font-family:var(--f-mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--fg-2);background:none;border:var(--rule-w) solid var(--rule);padding:6px 10px;cursor:pointer;display:inline-flex;gap:8px;align-items:center}
.theme-toggle:hover{color:var(--fg);border-color:var(--rule-2)}
.theme-toggle .pip{width:8px;height:8px;border-radius:50%;background:var(--fg)}
.label{font-family:var(--f-mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3)}
.num{font-family:var(--f-mono);font-size:11px;color:var(--fg-3)}
.display{font-family:var(--f-sans);font-weight:500;font-size:clamp(44px,7vw,108px);line-height:.96;letter-spacing:-.035em;margin:0}
.h1{font-weight:500;font-size:clamp(32px,4vw,56px);line-height:1.02;letter-spacing:-.025em;margin:0}
.h2{font-weight:500;font-size:clamp(22px,2.2vw,32px);line-height:1.1;letter-spacing:-.018em;margin:0}
.lede{font-weight:400;font-size:clamp(18px,1.4vw,22px);line-height:1.4;letter-spacing:-.01em;color:var(--fg)}
.body{font-size:15px;line-height:1.55;color:var(--fg-2)}
.mono{font-family:var(--f-mono)}
.hr{border:0;border-top:var(--rule-w) solid var(--rule);margin:0}
.ul{background:linear-gradient(currentColor,currentColor) no-repeat left 100% / 0% 1px;transition:background-size 280ms ease;padding-bottom:2px}
.ul:hover{background-size:100% 1px}

/* ========== 04-pages.css ========== */
.hero{padding:56px 0 72px;position:relative}
.hero .grid-12{align-items:end}
.bg-field{position:fixed;inset:0;pointer-events:none;z-index:-1;opacity:.55}
.bg-field::before,.bg-field::after{content:"";position:absolute;border-radius:50%;filter:blur(100px);opacity:.35;mix-blend-mode:multiply}
:root[data-theme="dark"] .bg-field::before,:root[data-theme="dark"] .bg-field::after{mix-blend-mode:screen;opacity:.18}
.bg-field::before{width:48vmax;height:48vmax;left:-10vmax;top:-10vmax;background:var(--accent);animation:drift1 42s ease-in-out infinite alternate}
.bg-field::after{width:40vmax;height:40vmax;right:-8vmax;bottom:-12vmax;background:oklch(0.7 0.06 230);animation:drift2 58s ease-in-out infinite alternate}
@keyframes drift1{to{transform:translate(6vmax,4vmax)}}
@keyframes drift2{to{transform:translate(-5vmax,-6vmax)}}
.tweaks{position:fixed;right:16px;bottom:16px;z-index:50;font-family:var(--f-mono);font-size:11px;background:var(--bg);border:1px solid var(--rule-2);box-shadow:0 30px 60px -30px rgba(0,0,0,.3);width:260px;display:none}
.tweaks.open{display:block}
.tweaks header{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid var(--rule);text-transform:uppercase;letter-spacing:.1em;color:var(--fg-3)}
.tweaks header button{background:none;border:0;color:var(--fg-3);cursor:pointer;font-family:inherit;font-size:inherit}
.tweaks .tw-row{padding:10px 12px;border-bottom:1px solid var(--rule);display:grid;gap:8px}
.tweaks .tw-row:last-child{border-bottom:0}
.tweaks .tw-row .k{color:var(--fg-3);text-transform:uppercase;letter-spacing:.1em}
.tweaks .swatches{display:flex;gap:6px;flex-wrap:wrap}
.tweaks .sw{width:20px;height:20px;border-radius:50%;border:2px solid transparent;cursor:pointer}
.tweaks .sw.sel{border-color:var(--fg)}
.tweaks .seg{display:flex;gap:0;border:1px solid var(--rule)}
.tweaks .seg button{flex:1;background:none;border:0;padding:6px 8px;cursor:pointer;font-family:inherit;font-size:inherit;color:var(--fg-2);text-transform:uppercase;letter-spacing:.08em;border-right:1px solid var(--rule)}
.tweaks .seg button:last-child{border-right:0}
.tweaks .seg button.sel{background:var(--fg);color:var(--bg)}
@media (max-width:900px){
  .nav ul{gap:14px}
}

/* ========== 05-nerdy.css ========== */
.term-bar{display:flex;align-items:center;gap:10px;padding:8px 12px;border:1px solid var(--rule);background:var(--bg-2);font-family:var(--f-mono);font-size:11px;color:var(--fg-2);letter-spacing:.04em}
.term-bar .dot{width:10px;height:10px;border-radius:50%;background:var(--rule-2)}
.term-bar .dot.red{background:oklch(0.65 0.18 25)}
.term-bar .dot.yel{background:oklch(0.82 0.14 85)}
.term-bar .dot.grn{background:oklch(0.72 0.14 150)}
.term-bar .path{color:var(--fg-3)}
.term-bar .path b{color:var(--fg-2);font-weight:500}
.term-bar .cursor{display:inline-block;width:7px;height:12px;background:var(--accent);margin-left:6px;animation:blink 1.05s steps(2) infinite;vertical-align:-2px}
@keyframes blink{50%{opacity:0}}
.boot{border:1px solid var(--rule);border-top:0;background:var(--bg);font-family:var(--f-mono);font-size:11.5px;line-height:1.55;color:var(--fg-2);padding:14px 20px;max-height:138px;overflow:hidden;position:relative}
.boot .ln{display:block;white-space:nowrap}
.boot .ln .t{color:var(--fg-3)}
.boot .ln .lvl-ok{color:oklch(0.58 0.14 150)}
.boot .ln .lvl-warn{color:oklch(0.65 0.15 70)}
.boot .ln .lvl-info{color:var(--fg-3)}
.boot .ln .lvl-run{color:var(--accent)}
.boot .ln .v{color:var(--fg)}
.boot::after{content:"";position:absolute;left:0;right:0;bottom:0;height:38px;background:linear-gradient(to bottom, transparent, var(--bg));pointer-events:none}
.hint{font-family:var(--f-mono);font-size:11px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.08em}
.hint .kbd{background:var(--bg-2);border:1px solid var(--rule);padding:1px 5px;color:var(--fg-2);border-radius:3px}
.hero.term{padding-top:28px}
.hero.term .terminal{margin-top:36px}

/* ========== 06-waves.css ========== */
.wave-wrap{position:relative;border:1px solid var(--rule);border-top:0;background:var(--bg-2);overflow:hidden}
.wave-wrap::after{content:"";position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(to bottom, transparent 0 2px, rgba(0,0,0,.028) 2px 3px);mix-blend-mode:multiply;opacity:.7}
:root[data-theme="dark"] .wave-wrap::after{background:repeating-linear-gradient(to bottom, transparent 0 2px, rgba(255,255,255,.035) 2px 3px);mix-blend-mode:screen}
.wave-canvas{display:block;width:100%;height:260px}
.wave-overlay{position:absolute;inset:0;z-index:2;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;padding:14px 18px;font-family:var(--f-mono);font-size:11px;color:var(--fg-2);text-transform:uppercase;letter-spacing:.08em}
.wave-overlay .row{display:flex;gap:20px;flex-wrap:wrap;align-items:center}
.wave-overlay .k{color:var(--fg-3)}
.wave-overlay .v{color:var(--fg)}
.wave-overlay .badge{padding:2px 8px;border:1px solid var(--rule-2);background:var(--bg)}
.wave-overlay .pulse{display:inline-block;width:8px;height:8px;border-radius:50%;background:oklch(0.72 0.14 150);box-shadow:0 0 0 0 oklch(0.72 0.14 150 / 0.5);animation:pulse 1.8s ease-out infinite;vertical-align:-1px;margin-right:6px}
@keyframes pulse{0%{box-shadow:0 0 0 0 oklch(0.72 0.14 150 / .45)}100%{box-shadow:0 0 0 10px oklch(0.72 0.14 150 / 0)}}
.vu{display:flex;gap:3px;align-items:flex-end;height:16px}
.vu i{display:block;width:3px;height:100%;background:var(--fg-3);opacity:.5;animation:vu 1.1s ease-in-out infinite}
.vu i:nth-child(1){animation-delay:-.05s;height:45%}
.vu i:nth-child(2){animation-delay:-.15s;height:80%}
.vu i:nth-child(3){animation-delay:-.25s;height:60%}
.vu i:nth-child(4){animation-delay:-.35s;height:95%;background:var(--accent);opacity:.9}
.vu i:nth-child(5){animation-delay:-.45s;height:70%}
.vu i:nth-child(6){animation-delay:-.55s;height:50%}
.vu i:nth-child(7){animation-delay:-.65s;height:85%}
.vu i:nth-child(8){animation-delay:-.75s;height:40%}
@keyframes vu{50%{transform:scaleY(.4)}}
.pretext{display:inline-flex;align-items:baseline;gap:10px;font-family:var(--f-mono);font-size:12px;padding:6px 10px;border:1px solid var(--rule);background:var(--bg-2);margin-bottom:22px;max-width:100%}
.pretext .tw-key{color:var(--fg-3);text-transform:lowercase;letter-spacing:.02em;white-space:nowrap}
.pretext .tw-val{color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:min(60ch,60vw)}
.pretext .tw-cursor{display:inline-block;width:7px;height:12px;background:var(--accent);margin-left:2px;animation:blink 1.05s steps(2) infinite;vertical-align:-2px;flex:none}

/* ========== 07-site-bg.css ========== */
html, body { position: relative; }
body > main, body > nav, body > .marquee, body > aside, body > .tweaks {
  position: relative; z-index: 2;
}
#site-bg-canvas { z-index: 0 !important; }
body::before{
  content:""; position:fixed; inset:0; z-index:1; pointer-events:none;
  background: radial-gradient(ellipse at 50% 30%, transparent 0%, var(--bg) 85%);
  opacity: .55;
}
:root[data-theme="dark"] body::before{ opacity: .60; }

/* ========== sm-portfolio.css ========== */
.impact{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--gutter);padding-top:36px;margin-top:36px;border-top:var(--rule-w) solid var(--rule)}
.impact .stat{border-left:1px solid var(--rule);padding-left:18px}
.impact .stat .v{font-family:var(--f-sans);font-weight:500;font-size:clamp(28px,3.2vw,44px);letter-spacing:-.025em;line-height:1;color:var(--fg);margin-bottom:8px}
.impact .stat .l{font-family:var(--f-mono);font-size:10.5px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.1em;line-height:1.4}
@media (max-width:900px){ .impact{grid-template-columns:1fr 1fr} }
.awards-strip{margin-top:28px;border-left:2px solid var(--accent);padding:10px 16px;font-size:14px;color:var(--fg-2);line-height:1.55;background:var(--bg-2)}
.awards-strip b{color:var(--fg);font-weight:500}
.cta-row{display:flex;gap:24px;flex-wrap:wrap;margin-top:28px;padding-top:22px;border-top:1px solid var(--rule)}
.cta-row a{display:inline-flex;gap:8px;align-items:center;font-family:var(--f-mono);font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--fg);border-bottom:1px solid transparent;padding-bottom:2px;transition:all 180ms ease}
.cta-row a:hover{border-bottom-color:var(--accent);color:var(--accent)}
.cta-row a svg{width:14px;height:14px}
.sec{padding:80px 0;border-top:var(--rule-w) solid var(--rule);position:relative}
.sec .sec-head{display:flex;gap:20px;align-items:center;margin-bottom:44px}
.sec .sec-head .bar{flex:1;height:1px;background:var(--rule)}
.sec .sec-head h2{margin:0;font-family:var(--f-sans);font-style:italic;font-weight:400;font-size:clamp(24px,2.4vw,36px);color:var(--fg);letter-spacing:-.018em}
.sec .sec-head .tag{font-family:var(--f-mono);font-size:11px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.1em}
.skill-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--gutter)}
.skill-cols .col h3{display:flex;gap:10px;align-items:center;font-family:var(--f-sans);font-weight:500;font-size:17px;margin:0 0 16px;letter-spacing:-.01em}
.skill-cols .col h3 .d{display:inline-block;width:8px;height:8px;border-radius:50%}
.skill-cols .col .chips{display:flex;flex-wrap:wrap;gap:6px}
.skill-cols .col .chips span{font-family:var(--f-mono);font-size:11.5px;padding:4px 10px;color:var(--fg-2);background:var(--bg-2);border:1px solid var(--rule)}
@media (max-width:900px){ .skill-cols{grid-template-columns:1fr} }
.card-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:22px}
@media (max-width:700px){ .card-grid{grid-template-columns:1fr} }
.card{position:relative;padding:22px;border:1px solid var(--rule);background:var(--bg);cursor:pointer;transition:border-color 200ms ease, transform 200ms ease, box-shadow 200ms ease;display:flex;flex-direction:column;min-height:180px}
.card:hover{border-color:var(--fg-3);transform:translateY(-2px);box-shadow:0 20px 40px -20px rgba(0,0,0,0.15)}
:root[data-theme="dark"] .card:hover{box-shadow:0 20px 40px -20px rgba(0,0,0,0.6)}
.card .card-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.card .card-tags span{font-family:var(--f-mono);font-size:10px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.1em}
.card .card-title{font-family:var(--f-sans);font-weight:500;font-size:19px;letter-spacing:-.015em;margin:0 0 10px;color:var(--fg);line-height:1.25}
.card:hover .card-title{color:var(--accent)}
.card .card-desc{font-size:14px;line-height:1.5;color:var(--fg-2);margin:0 0 14px;flex:1}
.card .card-more{font-family:var(--f-mono);font-size:11px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.1em;margin-top:auto;display:flex;align-items:center;gap:6px;opacity:0;transition:opacity 200ms ease}
.card:hover .card-more{opacity:1;color:var(--accent)}
.card .card-arrow{position:absolute;top:22px;right:22px;opacity:0;transition:all 200ms ease;color:var(--fg-3)}
.card:hover .card-arrow{opacity:1;transform:translateX(3px);color:var(--fg)}
.cert-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media (max-width:700px){ .cert-grid{grid-template-columns:1fr} }
.cert{display:flex;justify-content:flex-start;align-items:center;padding:16px 18px;border:1px solid var(--rule);background:var(--bg);transition:border-color 160ms ease}
.cert:hover{border-color:var(--fg-3)}
.cert .t{font-family:var(--f-sans);font-weight:500;font-size:14px;color:var(--fg);margin:0;line-height:1.3}
.cert .i{font-family:var(--f-mono);font-size:11px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.08em;margin-top:4px}
.timeline{display:grid;gap:36px;padding-left:0}
.tl-item{position:relative;padding-left:32px;border-left:2px solid var(--rule);padding-bottom:8px;padding-top:4px}
.tl-item::before{content:"";position:absolute;left:-9px;top:8px;width:16px;height:16px;border-radius:50%;background:var(--bg);border:2px solid var(--rule);transition:border-color 180ms ease}
.tl-item:hover{border-left-color:var(--accent)}
.tl-item:hover::before{border-color:var(--accent)}
.tl-item .tl-type{display:inline-block;font-family:var(--f-mono);font-size:10.5px;color:var(--accent);text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px;font-weight:500}
.tl-item .tl-title{font-family:var(--f-sans);font-weight:500;font-size:22px;letter-spacing:-.015em;margin:0 0 12px;color:var(--fg);line-height:1.2}
.tl-item .tl-excerpt{font-family:"Instrument Serif",Georgia,serif;font-style:italic;font-size:19px;line-height:1.45;color:var(--fg-2);margin:0 0 14px;white-space:pre-line}
.tl-item .tl-cta{font-family:var(--f-mono);font-size:11px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.1em;cursor:pointer;background:none;border:0;padding:0;display:inline-flex;gap:6px;align-items:center;transition:color 180ms ease}
.tl-item .tl-cta:hover{color:var(--accent)}
.contact-block{padding:96px 0 40px;border-top:var(--rule-w) solid var(--rule);text-align:center}
.contact-block .k{font-family:var(--f-mono);font-size:11px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.15em;margin-bottom:18px}
.contact-block h2{font-family:var(--f-sans);font-weight:500;font-size:clamp(36px,5vw,64px);letter-spacing:-.028em;line-height:1.02;margin:0 0 22px;color:var(--fg)}
.contact-block .sub{font-size:16px;color:var(--fg-2);max-width:55ch;margin:0 auto 36px;line-height:1.55}
.contact-block .links{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:30px}
.contact-block .links a{display:inline-flex;align-items:center;gap:10px;padding:12px 18px;border:1px solid var(--rule);font-family:var(--f-mono);font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--fg);transition:all 180ms ease;background:var(--bg)}
.contact-block .links a:hover{border-color:var(--accent);color:var(--accent)}
.contact-block .links a svg{width:16px;height:16px}
.contact-block .copy-toast{display:inline-block;margin-left:8px;font-family:var(--f-mono);font-size:11px;color:var(--accent);opacity:0;transform:translateY(4px);transition:all 180ms ease}
.contact-block .copy-toast.show{opacity:1;transform:translateY(0)}
.contact-block .meta{font-family:var(--f-mono);font-size:11px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.12em}
.sm-modal-overlay{position:fixed;inset:0;z-index:200;display:none;background:rgba(12,10,8,.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:24px;opacity:0;transition:opacity 260ms ease}
.sm-modal-overlay.open{display:flex;opacity:1}
.sm-modal{width:100%;max-width:680px;max-height:80vh;background:var(--bg);border:1px solid var(--rule-2);box-shadow:0 60px 120px -40px rgba(0,0,0,.5);display:flex;flex-direction:column;transform:translateY(12px) scale(.98);transition:transform 280ms cubic-bezier(0.16,1,0.3,1);position:relative;overflow:hidden}
.sm-modal-overlay.open .sm-modal{transform:translateY(0) scale(1)}
.sm-modal header{display:flex;justify-content:space-between;align-items:flex-start;padding:24px 28px;border-bottom:1px solid var(--rule);gap:20px;background:var(--bg-2)}

<script>
(function(){
  const CANVAS_ID = "site-bg-canvas";
  function getThemeColors(){
    const cs = getComputedStyle(document.documentElement);
    const isDark = document.documentElement.getAttribute("data-theme") === "dark";
    return {
      isDark,
      wave1: isDark ? "rgba(241,237,229,0.055)" : "rgba(22,21,20,0.045)",
      wave2: isDark ? "rgba(241,237,229,0.04)"  : "rgba(22,21,20,0.032)",
      accent: isDark ? "rgba(240,150,110,0.16)" : "rgba(198,106,62,0.14)",
      accentBright: isDark ? "rgba(240,150,110,0.32)" : "rgba(198,106,62,0.28)",
      tick: isDark ? "rgba(241,237,229,0.08)" : "rgba(22,21,20,0.06)",
      sweep: isDark ? "rgba(240,150,110,0.12)" : "rgba(198,106,62,0.08)",
    };
  }
  function mount(){
    if (document.getElementById(CANVAS_ID)) return;
    const c = document.createElement("canvas");
    c.id = CANVAS_ID;
    c.setAttribute("aria-hidden","true");
    Object.assign(c.style, { position:"fixed", inset:"0", width:"100%", height:"100%", pointerEvents:"none", zIndex:"0" });
    document.body.prepend(c);
    return c;
  }
  function resize(c){
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    c.width  = Math.floor(window.innerWidth  * dpr);
    c.height = Math.floor(window.innerHeight * dpr);
    const ctx = c.getContext("2d");
    ctx.setTransform(dpr,0,0,dpr,0,0);
    return { ctx, W: window.innerWidth, H: window.innerHeight };
  }
  function beatPulse(t){ const bpm = 72; const beatLen = 60/bpm; const phase = (t % beatLen)/beatLen; return Math.exp(-phase*5); }
  function draw(ctx, W, H, t){
    const col = getThemeColors();
    ctx.clearRect(0,0,W,H);
    const layers = [
      { f: 0.0030, sp: 0.45, a: 26, w: 1.1, c: col.wave1 },
      { f: 0.0050, sp: 0.70, a: 18, w: 1.0, c: col.wave2 },
      { f: 0.0080, sp: 1.10, a: 10, w: 0.9, c: col.accent },
    ];
    for (const L of layers){
      ctx.strokeStyle = L.c; ctx.lineWidth = L.w;
      for (let yBase = 90; yBase < H - 40; yBase += 95){
        ctx.beginPath();
        for (let x = 0; x <= W; x += 4){
          const y = yBase + Math.sin(x*L.f + t*L.sp + yBase*0.005) * L.a + Math.sin(x*L.f*2.3 + t*L.sp*0.6) * L.a * 0.3;
          if (x === 0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        }
        ctx.stroke();
      }
    }
    const pulse = beatPulse(t);
    const bars = 96; const bw = W / bars;
    for (let i = 0; i < bars; i++){
      const n1 = Math.sin(i*0.42 + t*1.9)*0.5 + 0.5;
      const n2 = Math.sin(i*0.17 - t*1.2 + 1.3)*0.5 + 0.5;
      const env = 0.35 + 0.65*pulse;
      const h = (n1*0.65 + n2*0.35) * env * 72;
      const alpha = 0.10 + 0.22*pulse;
      ctx.fillStyle = col.isDark ? `rgba(240,150,110,${alpha})` : `rgba(198,106,62,${alpha})`;
      ctx.fillRect(i*bw + bw*0.12, H - 40 - h, bw*0.76, h);
    }
    const sweepX = ((t*55) % (W + 260)) - 130;
    const grad = ctx.createLinearGradient(sweepX-130, 0, sweepX+130, 0);
    grad.addColorStop(0, "rgba(198,106,62,0)");
    grad.addColorStop(0.5, col.sweep);
    grad.addColorStop(1, "rgba(198,106,62,0)");
    ctx.fillStyle = grad;
    ctx.fillRect(sweepX-130, 0, 260, H);
    ctx.strokeStyle = col.tick; ctx.lineWidth = 1;
    const draws = [[60, 60, 1, 1], [W-60, 60, -1, 1], [60, H-60, 1,-1], [W-60, H-60,-1,-1]];
    for (const [x,y,sx,sy] of draws){
      for (let i = 0; i < 4; i++){
        ctx.beginPath(); ctx.moveTo(x, y + sy*i*18); ctx.lineTo(x + sx*8, y + sy*i*18); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x + sx*i*18, y); ctx.lineTo(x + sx*i*18, y + sy*8); ctx.stroke();
      }
    }
  }
  function start(){
    const check = () => {
      const off = localStorage.getItem("sm-bg") === "off";
      const el = document.getElementById(CANVAS_ID);
      if (el) el.style.display = off ? "none" : "";
    };
    const c = mount();
    if (!c) return;
    let dims = resize(c);
    const t0 = performance.now();
    const tick = (now) => {
      const t = (now - t0)/1000;
      if (dims.W > 0) draw(dims.ctx, dims.W, dims.H, t);
      requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
    window.addEventListener("resize", () => { dims = resize(c); });
    new MutationObserver(check).observe(document.documentElement, { attributes:true, attributeFilter:["data-theme"] });
    document.querySelectorAll('#segBg button').forEach(b => b.addEventListener("click", () => {
      const v = b.dataset.v;
      try { localStorage.setItem("sm-bg", v); } catch(_) {}
      check();
    }));
    check();
  }
  if (document.readyState === "loading"){ document.addEventListener("DOMContentLoaded", start); } else { start(); }
})();
</script>

<script>
(function(){
  function fitCanvas(c){
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const r = c.getBoundingClientRect();
    c.width = Math.floor(r.width * dpr);
    c.height = Math.floor(r.height * dpr);
    const ctx = c.getContext("2d");
    ctx.setTransform(dpr,0,0,dpr,0,0);
    return { ctx, w: r.width, h: r.height };
  }
  function themeColors(){
    const cs = getComputedStyle(document.documentElement);
    const isDark = document.documentElement.getAttribute("data-theme") === "dark";
    return {
      ink:    cs.getPropertyValue("--fg").trim()    || (isDark ? "#f1ede5" : "#161514"),
      dim:    cs.getPropertyValue("--fg-2").trim()  || (isDark ? "#b7b2a8" : "#4a4744"),
      fade:   cs.getPropertyValue("--fg-3").trim()  || (isDark ? "#6d6860" : "#8a857e"),
      accent: cs.getPropertyValue("--accent").trim()|| "oklch(0.58 0.14 35)",
      bg:     cs.getPropertyValue("--bg-2").trim()  || (isDark ? "#1c1b17" : "#ebe7df"),
      rule:   cs.getPropertyValue("--rule").trim()  || (isDark ? "#2a2823" : "#d8d3ca"),
      isDark,
    };
  }
  function amp(t, i){ return 0.5 + 0.5*Math.sin(t*0.35 + i*1.7); }
  function beat(t){ const bpm = 72; const beatLen = 60/bpm; const phase = (t % beatLen)/beatLen; return Math.exp(-phase*5) * 0.35; }
  function draw(c, ctx, W, H, t){
    const col = themeColors();
    ctx.clearRect(0,0,W,H);
    const mid = H*0.5;
    ctx.save();
    ctx.strokeStyle = col.rule;
    ctx.globalAlpha = col.isDark ? 0.35 : 0.5;
    ctx.lineWidth = 1;
    for (let i=1;i<4;i++){ const y = H*(i/4); ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
    ctx.restore();
    const bars = 64; const bw = W / bars;
    ctx.save();
    for (let i=0;i<bars;i++){
      const s = Math.sin(i*0.21 + t*1.2) * 0.5 + 0.5;
      const s2 = Math.sin(i*0.61 + t*0.6 + 2.0) * 0.5 + 0.5;
      const env = Math.exp(-i/bars * 2.2);
      const b = (s*0.6 + s2*0.4) * env + beat(t)*env*0.8;
      const h = Math.max(2, b * H * 0.48);
      const x = i*bw + 1;
      ctx.fillStyle = col.fade;
      ctx.globalAlpha = col.isDark ? 0.22 : 0.30;
      ctx.fillRect(x, mid - h/2, Math.max(1, bw - 2), h);
    }
    ctx.restore();
    const layers = [
      { freq: 0.012, speed: 0.6, amp: 0.24, line: 1.2, color: col.fade,   alpha: col.isDark ? 0.55 : 0.55, phase: 0.0 },
      { freq: 0.020, speed: 0.9, amp: 0.16, line: 1.4, color: col.dim,    alpha: col.isDark ? 0.85 : 0.75, phase: 1.3 },
      { freq: 0.028, speed: 1.3, amp: 0.10, line: 1.8, color: col.accent, alpha: 1.0,                       phase: 2.7 },
    ];
    for (let li=0; li<layers.length; li++){
      const L = layers[li];
      ctx.save();
      ctx.globalAlpha = L.alpha;
      ctx.strokeStyle = L.color;
      ctx.lineWidth = L.line;
      ctx.lineJoin = "round"; ctx.lineCap = "round";
      ctx.beginPath();
      const a = L.amp * H * (0.6 + 0.4*amp(t, li)) + beat(t)*H*0.05;
      for (let x=0;x<=W;x+=2){
        const y = mid + Math.sin(x*L.freq + t*L.speed + L.phase) * a + Math.sin(x*L.freq*2.1 + t*L.speed*0.6 + L.phase*1.7) * a*0.35 + Math.sin(x*L.freq*0.45 - t*L.speed*0.3) * a*0.15;
        if (x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.stroke();
      ctx.restore();
    }
    const phX = ((t*40) % (W+120)) - 60;
    ctx.save();
    ctx.strokeStyle = col.accent;
    ctx.globalAlpha = 0.55;
    ctx.lineWidth = 1;
    ctx.setLineDash([2,3]);
    ctx.beginPath(); ctx.moveTo(phX, 8); ctx.lineTo(phX, H-8); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = col.accent;
    ctx.globalAlpha = 1;
    ctx.beginPath(); ctx.arc(phX, mid, 3, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.save();
    ctx.fillStyle = col.fade;
    ctx.globalAlpha = col.isDark ? 0.5 : 0.6;
    for (let i=0;i<=20;i++){ const x = W*(i/20); const big = (i%5===0); ctx.fillRect(x, H-8, 1, big ? 6 : 3); }
    ctx.restore();
  }
  function mountCanvas(c){
    const size = () => fitCanvas(c);
    let dims = size();
    let lastW = 0, lastH = 0;
    const start = performance.now();
    function tick(now){
      const r = c.getBoundingClientRect();
      if (r.width > 0 && (Math.abs(r.width - lastW) > 0.5 || Math.abs(r.height - lastH) > 0.5)){
        dims = size(); lastW = r.width; lastH = r.height;
      }
      const t = (now - start)/1000;
      if (dims.w > 0) draw(c, dims.ctx, dims.w, dims.h, t);
      c._raf = requestAnimationFrame(tick);
    }
    c._raf = requestAnimationFrame(tick);
    const ro = new ResizeObserver(() => { dims = size(); });
    ro.observe(c);
  }
  window.mountWaveCanvas = mountCanvas;
})();
</script>

function openModal(item){
  const ov = document.getElementById("smModal");
  ov.querySelector(".type").textContent  = item.type || "Project";
  ov.querySelector(".title").textContent = item.title;
  ov.querySelector(".body").textContent  = item.fullContent || item.description || "";
  const linkWrap = ov.querySelector("footer");
  const link = ov.querySelector("footer a");
  if (item.link && item.link !== "#"){ link.href = item.link; linkWrap.style.display = "flex"; }
  else { linkWrap.style.display = "none"; }
  ov.classList.add("open");
  ov.setAttribute("aria-hidden","false");
  document.body.style.overflow = "hidden";
}
function closeModal(){
  const ov = document.getElementById("smModal");
  ov.classList.remove("open");
  ov.setAttribute("aria-hidden","true");
  document.body.style.overflow = "";
}

const TW_POOL = [

  { k:"shipping",    v:"autonomous multi-agent marketing orchestration" },

  { k:"last ship",   v:"snowflake cortex resume analyzer · live" }
];
const wait = (ms) => new Promise(r => setTimeout(r, ms));
async function smTypewriter(el){
  let i = 0;
  while (el.isConnected){
    const { k, v } = TW_POOL[i % TW_POOL.length]; i++;
    el.querySelector(".tw-key").textContent = "$ " + k;
    const target = v;
    const out = el.querySelector(".tw-val"); out.textContent = "";
    for (let c = 0; c <= target.length; c++){
      out.textContent = target.slice(0, c);
      await wait(18 + Math.random()*32);
    }
    await wait(2400);
    for (let c = target.length; c >= 0; c--){
      out.textContent = target.slice(0, c);
      await wait(8 + Math.random()*10);
    }
    await wait(260);
  }
}

document.addEventListener("DOMContentLoaded", () => {
  const main = document.getElementById("smMain");
  main.innerHTML = [
    renderHero(),
    renderStack(),
    renderCerts(),
    renderThought(),
    renderDev(),
    renderArt(),
    renderContact()
  ].join("");

  document.querySelectorAll("[data-typewriter]").forEach(el => smTypewriter(el));

  if (window.mountWaveCanvas){
    document.querySelectorAll("[data-wave-canvas]").forEach(c => window.mountWaveCanvas(c));
  }

  main.addEventListener("click", (e) => {
    const card = e.target.closest("[data-item-id]");
    if (card){
      const id = Number(card.dataset.itemId);
      const parent = card.closest("[data-cards]");
      const list = parent?.dataset.cards === "dev" ? SM_DATA.techProjects : SM_DATA.thoughtLeadership;
      const item = list.find(x => x.id === id);
      if (item) openModal(item);
      return;
    }
    const art = e.target.closest("[data-art-id]");
    if (art){
      const id = Number(art.dataset.artId);
      const item = SM_DATA.creativeWorks.find(x => x.id === id);
      if (item) openModal(item);
      return;
    }
  });

  main.addEventListener("keydown", (e) => {
    if ((e.key === "Enter" || e.key === " ") && e.target.matches("[data-item-id]")){
      e.preventDefault();
      e.target.click();
    }
  });

  const ov = document.getElementById("smModal");
  ov.addEventListener("click", (e) => { if (e.target === ov) closeModal(); });
  ov.querySelector("header button").addEventListener("click", closeModal);
  document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });
});
